<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lander</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: monospace; touch-action: none; }
  canvas { display: block; }
  #hud {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; color: #fff; font-size: 16px;
  }
  #score { position: absolute; top: 8px; left: 12px; font-size: 14px; }
  #high-score { position: absolute; top: 8px; right: 12px; font-size: 14px; }
  #fuel-bar-container {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    width: 160px; height: 10px; border: 1px solid #888;
  }
  #fuel-bar { height: 100%; background: #0f0; transition: width 0.1s; }
  #fuel-label { position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%); font-size: 12px; }
  #lives { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); font-size: 14px; }
  #altitude { position: absolute; bottom: 44px; left: 50%; transform: translateX(-50%); }
  #message {
    position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
    font-size: 20px; text-align: center; display: none;
  }

  /* Start screen */
  #start-screen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; z-index: 10; background: rgba(0,0,0,0.85);
    padding: 20px;
  }
  #start-screen h1 { font-size: 40px; margin-bottom: 16px; color: #0f0; }
  #start-screen .info { font-size: 13px; color: #aaa; text-align: center; line-height: 1.6; }
  #start-screen .info b { color: #fff; }
  #start-screen .touch-info { display: none; }
  #start-screen .start-btn {
    margin-top: 24px; padding: 14px 40px; font-size: 20px; font-family: monospace;
    background: #0a0; color: #fff; border: none; cursor: pointer;
    pointer-events: all; border-radius: 4px;
  }
  #start-screen .start-btn:hover { background: #0c0; }
  #start-screen .hint { margin-top: 12px; font-size: 12px; color: #666; }

  /* Show touch instructions on touch devices */
  .is-touch #start-screen .touch-info { display: block; }
  @media (pointer: coarse), (any-pointer: coarse) {
    #start-screen .touch-info { display: block !important; }
    #touch-controls { display: block !important; }
  }

  /* Touch controls */
  #touch-controls {
    display: none; position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 5;
  }
  .is-touch #touch-controls { display: block; }
  /* Move fuel bar up on touch to not overlap buttons */
  .is-touch #fuel-bar-container { bottom: 100px; }
  .is-touch #fuel-label { bottom: 114px; }

  #joystick-zone {
    position: absolute; bottom: 30px; left: 20px; width: 120px; height: 120px;
    pointer-events: all; touch-action: none;
  }
  #joystick-base {
    width: 120px; height: 120px; border-radius: 50%;
    background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.15);
    position: relative;
  }
  #joystick-thumb {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    position: absolute; top: 38px; left: 38px;
  }

  #touch-buttons {
    position: absolute; bottom: 30px; right: 20px;
    display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
    pointer-events: all; touch-action: none;
  }
  .touch-btn {
    width: 64px; height: 64px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.6); font-family: monospace; font-size: 10px; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none;
  }
  .touch-btn.active {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.5);
    color: #fff;
  }
  .touch-row { display: flex; gap: 8px; }

  @media (max-width: 480px) {
    #start-screen h1 { font-size: 32px; }
    #start-screen .info { font-size: 12px; }
  }
</style>
</head>
<body>

<div id="hud">
  <div id="score">SCORE: 0</div>
  <div id="high-score">HIGH: 0</div>
  <div id="lives"></div>
  <div id="altitude"></div>
  <div id="fuel-label">FUEL</div>
  <div id="fuel-bar-container"><div id="fuel-bar" style="width:100%"></div></div>
  <div id="message"></div>
</div>

<div id="touch-controls">
  <div id="joystick-zone">
    <div id="joystick-base">
      <div id="joystick-thumb"></div>
    </div>
  </div>
  <div id="touch-buttons">
    <div class="touch-btn" id="btn-thrust" data-key="z">THRUST</div>
    <div class="touch-row">
      <div class="touch-btn" id="btn-hover" data-key="x">HOVER</div>
      <div class="touch-btn" id="btn-fire" data-key="c">FIRE</div>
    </div>
  </div>
</div>

<div id="start-screen">
  <h1>LANDER</h1>
  <div class="info desktop-info">
    <b>Arrow keys</b> — steer &nbsp; <b>Z</b> — thrust &nbsp; <b>X</b> — hover &nbsp; <b>C</b> — fire
  </div>
  <div class="info touch-info">
    <b>Left stick</b> — steer<br>
    <b>Right buttons</b> — thrust / hover / fire
  </div>
  <p class="hint">Land gently on the launchpad to refuel</p>
  <button class="start-btn" id="start-btn">START</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
  }
}
</script>
<script type="module" src="js/game.js"></script>
</body>
</html>
